services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-agentplatform}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-agentplatform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  agent-api:
    build:
      context: .
      dockerfile: src/AgentPlatform.Api/Dockerfile
    depends_on:
      - qdrant
      - postgres
    ports:
      - "8080:8080"
    volumes:
      # documents/ klasörünü konteynere salt-okunur bağla — ingestion buradan okur
      - ./documents:/app/documents:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Llm__Provider=${LLM_PROVIDER:-OpenAI}
      - Llm__OpenAI__ApiKey=${OPENAI_API_KEY:-}
      - Llm__OpenAI__Model=${OPENAI_MODEL:-gpt-4o-mini}
      - Llm__AzureOpenAI__Endpoint=${AZURE_OPENAI_ENDPOINT:-}
      - Llm__AzureOpenAI__ApiKey=${AZURE_OPENAI_API_KEY:-}
      - Llm__AzureOpenAI__DeploymentName=${AZURE_OPENAI_DEPLOYMENT:-}
      - Security__ApiKey=${API_KEY:-}
      # Docker Compose network'ünde servis adı host olarak kullanılır
      - Rag__Qdrant__Host=qdrant
      - Rag__Qdrant__Port=6334
      # TELEGRAM
      - Telegram__Enabled=${TELEGRAM_ENABLED:-false}
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN:-}
      - Telegram__AllowedUserIds=${TELEGRAM_ALLOWED_USER_IDS:-}
      # POSTGRES
      - Postgres__ConnectionString=Host=postgres;Port=5432;Username=${POSTGRES_USER:-agentplatform};Password=${POSTGRES_PASSWORD:-changeme};Database=${POSTGRES_DB:-agentplatform}
    
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  qdrant_data:
  postgres_data:
